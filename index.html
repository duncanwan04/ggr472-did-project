<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script 
        src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet" 
        href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.css" 
        type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
    <title>Toronto Cycling Safety Map</title>
</head>


<body>
    <div id="sidebar" class="sidebar">
        <h1>Toronto Cycling Safety Map</h1>
        <p>Cycling infrastructure, collisions, traffic flow, bikeshare stations</p>

        <div id="safety" class="panel"> 
            <h2>Safety (Collisions)     <button id="toggle_safety">On/Off</button></h2>
                <label for="year-filter">Collision Year:</label>
                <select id="year-filter">
                    <option value="all">All Years</option>
                    <option value="2020">2020</option>
                    <option value="2021">2021</option>
                    <option value="2022">2022</option>
                    <option value="2023">2023</option>
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                </select>
                <br>
                <label for="fatalities_button">Show/Hide Fatal Collisions </label>
                <input type="checkbox" id="fatalities_button" checked>
                <br>
                <label for="injury_slider">Collisions Resulting in Injury (%):</label>
                <input id="injury_input" type="number" min="0" max="100" step="1" value="0">
                <input id="injury_slider" type="range" min="0" max="100" step="1" value="0">

        </div>



        <div class="panel" id="infrastructure"></div>

        <div class="panel" id="traffic-flow">
            <h2>Traffic Flow     <button id="toggle_traffic">On/Off</button></h2>
            <p>
                Traffic flow data represent cordon counts collected at entry points during a single observation period in 2022
            </p>
            <label for="biking_count_slider">Minimum Cycling Count</label>
                <input id="biking_count_input" type="number" min="0" max="100" step="1" value="0">
                <input id="biking_count_slider" type="range" min="0" max="100" step="1" value="0">
            <br>
            <label for="biking_percentage_slider">Minimum Cycling Share (%)</label>
                <input id="biking_percentage_input" type="number" min="0" max="100" step="1" value="0">
                <input id="biking_percentage_slider" type="range" min="0" max="100" step="1" value="0">
        </div>     

        <div class="panel" id="bikeshare"></div>

    </div>

    <div id="legend_container" class="legend">
        <div id="safety_legend" class="legend_section"> </div>
        <div id="traffic_flow_legend" class="legend_section">
            <h4>Cordon Legend</h4>
            <div><span></span> 0</div>
            <div><span></span> 1–2</div>
            <div><span></span> 3–5</div>
            <div><span></span> 6–10</div>
            <div><span></span> 11–19</div>
            <div><span></span> 20–29</div>
            <div><span></span> 30–39</div>
            <div><span></span> 40+</div>
        </div>
    </div>

    <button id="return_button" class="return_button">Return</button>
    <div id="map" class="map-container"></div>

    <script src="script.js"></script>
</body>

</html>
